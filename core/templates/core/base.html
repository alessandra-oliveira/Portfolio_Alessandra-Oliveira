<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- configuração de responsividade  -->
    <title>{% block title %}Meu Portfólio{% endblock %}</title> <!-- block title cria um espaço que pode ser substituído -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #F3F0FF;
            color: #333;
        }
        header {
            background-color: #A78BFA;
            color: white;
            padding: 20px 0;
            text-align: center;
        }
        header h1 {
            color: #ffffff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0,2);
        }
        nav {
            background-color: #2E2A5E;
            padding: 10px 0;
            text-align: center;
        }
        nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-size: 1.1em;
        }
        nav a:hover {
            text-decoration: underline;
        }
        .container {
            max-width: 960px;
            margin: 30px auto;
            padding: 0 20px;
            border-radius: 15px;
        }
        footer {
            background-color: #A78BFA;
            color: white;
            text-align: center;
            padding: 15px 0;
            margin-top: 40px;
        }
        {% block extra_css %}{% endblock %}
    </style>
</head>
<body>
    <header>
        <h1>{% block header_title %}Portfólio do Aluno{% endblock %}</h1>
    </header>

    <nav>
        <a href="{% url 'portfolio:home' %}">Início</a>
        <a href="{% url 'portfolio:projetos' %}">Projetos</a>
        <a href="{% url 'portfolio:contato' %}">Contato</a>
    </nav>

    <div class="container"> <!-- aqui fica o conteúdo principal -->
        {% block content %}
        {% endblock %}
    </div>

    <footer>
        <p>&copy; 2026 - Portfólio Acadêmico | UAST</p>
    </footer>
</body>
</html>
